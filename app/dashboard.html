<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — StorageIQ</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
/* ══════════════════════════════════════════════════════
   PARCYL v2 — CSS TOKEN BRIDGE
   JS applyTheme() writes these vars on every mode switch
══════════════════════════════════════════════════════ */
:root {
  /* populated by applyTheme() on DOMContentLoaded */
  --bg-primary:       #1C1C1E;
  --bg-secondary:     #2C2C2E;
  --bg-tertiary:      #3A3A3C;
  --bg-elevated:      #48484A;

  --accent-primary:       #3EAA42;
  --accent-primaryHover:  #359438;
  --accent-primaryMuted:  rgba(62,170,66,0.12);
  --accent-primaryBorder: rgba(62,170,66,0.30);
  --accent-green:         #34C759;
  --accent-greenMuted:    rgba(52,199,89,0.12);

  --text-primary:     rgba(255,255,255,1.0);
  --text-secondary:   rgba(255,255,255,0.80);
  --text-tertiary:    rgba(255,255,255,0.55);
  --text-quaternary:  rgba(255,255,255,0.35);

  --border-subtle:    rgba(255,255,255,0.08);
  --border-default:   rgba(255,255,255,0.12);
  --border-strong:    rgba(255,255,255,0.20);

  --semantic-success: #34C759;
  --semantic-warning: #FFD60A;
  --semantic-error:   #FF453A;
  --semantic-info:    #0A84FF;

  --font-display: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
  --font-mono:    'JetBrains Mono', monospace;

  /* Legacy aliases (used throughout CSS) */
  --ink:    var(--bg-primary);
  --ink2:   var(--bg-secondary);
  --ink3:   var(--bg-tertiary);
  --seam:   var(--border-subtle);
  --seam2:  var(--border-default);
  --fog:    var(--text-quaternary);
  --mist:   var(--text-tertiary);
  --ghost:  var(--text-secondary);
  --white:  var(--text-primary);
  --blue:       var(--accent-primary);
  --blue-lt:    var(--accent-green);
  --blue-glow:  var(--accent-primaryMuted);
  --teal:       var(--semantic-info);
  --teal-lt:    #5AC8FA;
  --amber:      #FF9F0A;
  --amber-lt:   var(--semantic-warning);
  --emerald:    var(--semantic-success);
  --emerald-lt: var(--semantic-success);
  --red:        var(--semantic-error);
  --red-lt:     var(--semantic-error);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

body {
  font-family: var(--font-display);
  background: var(--bg-primary);
  color: var(--text-secondary);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.2s, color 0.2s;
}

/* grain overlay — dark only */
body:not(.light)::after {
  content:'';
  position:fixed;inset:0;
  pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
  z-index:9999;opacity:0.4;
}

/* ── scrollbar ── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg-primary)}
::-webkit-scrollbar-thumb{background:var(--border-default);border-radius:3px}
body.light ::-webkit-scrollbar-track{background:#F2F2F7}
body.light ::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.18)}

/* ══════════════════════════════════════════════════════
   TOP NAV
══════════════════════════════════════════════════════ */
.topnav {
  position: sticky; top:0; z-index:100;
  display: flex; align-items:center; justify-content:space-between;
  padding: 0.875rem 2rem;
  background: rgba(28,28,30,0.9);
  backdrop-filter: blur(16px) saturate(1.6);
  border-bottom: 1px solid var(--border-subtle);
  transition: background 0.25s, border-color 0.25s;
}

.nav-brand {
  display:flex; align-items:center; gap:0.75rem;
}
.nav-icon {
  width:2.25rem; height:2.25rem;
  background: linear-gradient(135deg, var(--accent-primaryHover), var(--accent-primary));
  border-radius:0.5rem;
  display:flex; align-items:center; justify-content:center;
  box-shadow: 0 0 16px var(--accent-primaryMuted);
  transition: all 0.2s;
}
.nav-wordmark {
  font-family: var(--font-display);
  font-size: 1.35rem;
  color: var(--text-primary);
  letter-spacing: -0.01em;
}
.nav-wordmark sup {
  font-family: var(--font-display);
  font-size: 0.5rem;
  font-weight:700;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color: var(--accent-green);
  vertical-align: super;
  margin-left:2px;
}
.nav-steps {
  display:flex; align-items:center; gap:0.25rem;
}
.nav-step {
  display:flex; align-items:center; gap:0.35rem;
  padding: 0.35rem 0.75rem;
  border-radius: 2rem;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-quaternary);
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid transparent;
  text-decoration: none;
}
.nav-step:hover {
  color: var(--text-tertiary);
  background: rgba(255,255,255,0.04);
}
.nav-step.active {
  background: rgba(62,170,66,0.12);
  border-color: rgba(62,170,66,0.30);
  color: var(--accent-green);
}
.nav-step-num {
  width:1.25rem; height:1.25rem;
  border-radius:50%;
  background:var(--seam);
  display:flex; align-items:center; justify-content:center;
  font-size:0.6rem;
  font-weight:800;
}
.nav-step.active .nav-step-num {
  background: var(--accent-primary);
  color:#fff;
}
.nav-step-sep {
  width:2rem; height:1px;
  background: var(--border-subtle);
}

.theme-toggle {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-default);
  border-radius: 2rem;
  padding: 0.4rem 0.85rem;
  color: var(--text-tertiary);
  font-size: 0.65rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.theme-toggle:hover {
  background: var(--bg-elevated);
  color: var(--text-secondary);
}
.theme-toggle i {
  width: 14px;
  height: 14px;
}

.btn-primary {
  font-size: 0.7rem;
  font-weight:700;
  font-family:var(--font-display);
  letter-spacing:0.08em;
  text-transform:uppercase;
  background: var(--accent-primary);
  color:#fff;
  padding: 0.5rem 1.25rem;
  border-radius:2rem;
  border:none;
  cursor:pointer;
  transition:all 0.2s;
}
.btn-primary:hover { background: var(--accent-primaryHover); transform:translateY(-1px); }

/* ══════════════════════════════════════════════════════
   DASHBOARD STYLES
══════════════════════════════════════════════════════ */
.dashboard-layout {
  max-width: 1200px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
}

.dashboard-hero {
  margin-bottom: 2rem;
  padding-bottom: 1.5rem;
  border-bottom: 1px solid var(--border-subtle);
}
.dashboard-hero h1 {
  font-family: var(--font-display);
  font-size: 2rem;
  color: var(--text-primary);
  letter-spacing: -0.02em;
}
.dashboard-hero p {
  font-size: 0.8rem;
  color: var(--text-quaternary);
  margin-top: 0.25rem;
}

.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1rem;
  margin-bottom: 2rem;
}
.stat-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border-subtle);
  border-radius: 0.75rem;
  padding: 1.25rem;
  text-align: center;
}
.stat-label {
  font-size: 0.55rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-quaternary);
  margin-bottom: 0.4rem;
}
.stat-value {
  font-family: var(--font-mono);
  font-size: 1.75rem;
  font-weight: 600;
  color: var(--text-primary);
}
.stat-value.green { color: var(--semantic-success); }
.stat-value.blue { color: var(--accent-green); }

.section-title {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-quaternary);
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.pipeline-section {
  background: var(--bg-secondary);
  border: 1px solid var(--border-subtle);
  border-radius: 0.875rem;
  padding: 1.25rem;
  margin-bottom: 1.5rem;
}
.pipeline-bars {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}
.pipeline-row {
  display: flex;
  align-items: center;
  gap: 1rem;
}
.pipeline-label {
  width: 120px;
  font-size: 0.7rem;
  color: var(--text-tertiary);
}
.pipeline-bar {
  flex: 1;
  height: 24px;
  background: var(--bg-primary);
  border-radius: 4px;
  overflow: hidden;
}
.pipeline-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-primaryHover), var(--accent-primary));
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 0.5rem;
  min-width: 2rem;
}
.pipeline-bar-text {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  font-weight: 600;
  color: #fff;
}
.pipeline-value {
  width: 100px;
  text-align: right;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-secondary);
}

.closing-section {
  background: var(--bg-secondary);
  border: 1px solid var(--border-subtle);
  border-radius: 0.875rem;
  overflow: hidden;
  margin-bottom: 1.5rem;
}
.closing-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.75rem;
}
.closing-table thead {
  background: var(--bg-tertiary);
}
.closing-table th {
  padding: 0.75rem 1rem;
  text-align: left;
  font-size: 0.55rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-quaternary);
  border-bottom: 1px solid var(--border-subtle);
}
.closing-table td {
  padding: 0.75rem 1rem;
  border-bottom: 1px solid var(--border-subtle);
  color: var(--text-secondary);
}
.closing-table td.mono {
  font-family: var(--font-mono);
}
.closing-table tr.urgent td {
  background: rgba(255, 69, 58, 0.08);
}
.closing-table .days-badge {
  display: inline-block;
  padding: 0.2rem 0.5rem;
  border-radius: 1rem;
  font-size: 0.65rem;
  font-weight: 600;
  font-family: var(--font-mono);
}
.days-badge.green { background: rgba(52,199,89,0.12); color: var(--semantic-success); }
.days-badge.amber { background: rgba(255,214,10,0.12); color: var(--semantic-warning); }
.days-badge.red { background: rgba(255,69,58,0.12); color: var(--semantic-error); }

.activity-section {
  background: var(--bg-secondary);
  border: 1px solid var(--border-subtle);
  border-radius: 0.875rem;
  padding: 1.25rem;
  margin-bottom: 1.5rem;
}
.activity-feed {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}
.activity-item {
  display: flex;
  gap: 0.75rem;
  padding: 0.65rem;
  background: var(--bg-primary);
  border-radius: 0.5rem;
}
.activity-icon {
  width: 2rem;
  height: 2rem;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.activity-icon.note { background: rgba(255,255,255,0.08); color: var(--text-tertiary); }
.activity-icon.call { background: rgba(10,132,255,0.12); color: var(--semantic-info); }
.activity-icon.email { background: rgba(90,200,250,0.12); color: #5AC8FA; }
.activity-icon.stage_change { background: rgba(52,199,89,0.12); color: var(--semantic-success); }
.activity-icon.document { background: rgba(255,159,10,0.12); color: #FF9F0A; }
.activity-icon.offer { background: rgba(62,170,66,0.12); color: var(--accent-green); }
.activity-content { flex: 1; }
.activity-deal {
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 0.15rem;
}
.activity-text {
  font-size: 0.7rem;
  color: var(--text-tertiary);
}
.activity-time {
  font-size: 0.6rem;
  color: var(--text-quaternary);
  margin-top: 0.2rem;
}

.quick-actions {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
}
.quick-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  background: var(--bg-secondary);
  border: 1px solid var(--border-default);
  color: var(--text-secondary);
  padding: 0.65rem 1.25rem;
  border-radius: 2rem;
  font-size: 0.7rem;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.15s;
  font-family: var(--font-display);
}
.quick-btn:hover {
  background: var(--accent-primaryMuted);
  border-color: var(--accent-primaryBorder);
  color: var(--accent-green);
}

/* Priority dots */
.priority-hot { background: #FF453A; }
.priority-warm { background: #FFD60A; }
.priority-cold { background: #0A84FF; }
</style>
</head>
<body>
  <div id="appNav"></div>

  <div class="dashboard-layout">
    <div class="dashboard-hero">
      <h1>Pipeline Dashboard</h1>
      <p>Real-time view of your acquisition pipeline</p>
    </div>

    <div class="stats-row" id="statsRow">
      <!-- Populated by JS -->
    </div>

    <div class="section-title">
      <i data-lucide="bar-chart-2" style="width:14px;height:14px;"></i>
      Pipeline Overview
    </div>
    <div class="pipeline-section">
      <div class="pipeline-bars" id="pipelineBars">
        <!-- Populated by JS -->
      </div>
    </div>

    <div class="section-title">
      <i data-lucide="clock" style="width:14px;height:14px;"></i>
      Deals Closing Soon (Next 30 Days)
    </div>
    <div class="closing-section">
      <table class="closing-table">
        <thead>
          <tr>
            <th>Property</th>
            <th>Stage</th>
            <th>Closing Date</th>
            <th>Days Left</th>
            <th>Priority</th>
          </tr>
        </thead>
        <tbody id="closingTableBody">
          <!-- Populated by JS -->
        </tbody>
      </table>
    </div>

    <div class="section-title">
      <i data-lucide="activity" style="width:14px;height:14px;"></i>
      Recent Activity
    </div>
    <div class="activity-section">
      <div class="activity-feed" id="activityFeed">
        <!-- Populated by JS -->
      </div>
    </div>

    <div class="section-title">
      <i data-lucide="zap" style="width:14px;height:14px;"></i>
      Quick Actions
    </div>
    <div class="quick-actions">
      <a href="crm.html" class="quick-btn">
        <i data-lucide="plus" style="width:14px;height:14px;"></i> New Deal
      </a>
      <a href="index.html" class="quick-btn">
        <i data-lucide="calculator" style="width:14px;height:14px;"></i> Run Underwriting
      </a>
      <a href="market.html" class="quick-btn">
        <i data-lucide="map" style="width:14px;height:14px;"></i> View Market Map
      </a>
    </div>
  </div>

  <script src="js/shared.js"></script>
  <script src="js/deals.js"></script>
  <script>
    // Format currency
    function formatCurrency(n) {
      if (!n && n !== 0) return "—";
      return "$" + Math.round(n).toLocaleString();
    }

    // Format date
    function formatDate(iso) {
      if (!iso) return "—";
      var d = new Date(iso);
      return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    }

    // Days until date
    function daysUntil(iso) {
      if (!iso) return null;
      var now = new Date();
      var target = new Date(iso);
      var diff = Math.ceil((target - now) / (1000 * 60 * 60 * 24));
      return diff;
    }

    // Render stats row
    function renderStats() {
      var stats = dealsGetStats();
      var active = stats.total - (stats.byStage.dead || 0);
      var underContract = stats.byStage.under_contract || 0;

      document.getElementById("statsRow").innerHTML =
        '<div class="stat-card"><div class="stat-label">Total Deals</div><div class="stat-value">' + stats.total + '</div></div>' +
        '<div class="stat-card"><div class="stat-label">Under Contract</div><div class="stat-value blue">' + underContract + '</div></div>' +
        '<div class="stat-card"><div class="stat-label">Pipeline Value</div><div class="stat-value green">' + formatCurrency(stats.totalValue) + '</div></div>' +
        '<div class="stat-card"><div class="stat-label">Avg Price</div><div class="stat-value">' + formatCurrency(stats.avgPrice) + '</div></div>';
    }

    // Render pipeline bars
    function renderPipeline() {
      var stats = dealsGetStats();
      var total = stats.total || 1;
      var html = "";

      DEAL_STAGES.forEach(function(stage) {
        var count = stats.byStage[stage.id] || 0;
        var pct = Math.round((count / total) * 100);
        var deals = dealsByStage(stage.id);
        var value = deals.reduce(function(sum, d) { return sum + (d.askingPrice || 0); }, 0);

        html += '<div class="pipeline-row">' +
          '<div class="pipeline-label">' + stage.label + '</div>' +
          '<div class="pipeline-bar"><div class="pipeline-bar-fill" style="width:' + Math.max(pct, 5) + '%"><span class="pipeline-bar-text">' + count + '</span></div></div>' +
          '<div class="pipeline-value">' + formatCurrency(value) + '</div>' +
        '</div>';
      });

      document.getElementById("pipelineBars").innerHTML = html;
    }

    // Render closing soon table
    function renderClosingSoon() {
      var deals = dealsGetAll();
      var now = new Date();
      var thirtyDays = new Date(now.getTime() + 30 * 24 * 60 * 60 * 1000);

      var closing = deals.filter(function(d) {
        if (!d.closingDate) return false;
        var closeDate = new Date(d.closingDate);
        return closeDate >= now && closeDate <= thirtyDays;
      }).sort(function(a, b) {
        return new Date(a.closingDate) - new Date(b.closingDate);
      });

      var html = "";
      if (closing.length === 0) {
        html = '<tr><td colspan="5" style="text-align:center;color:var(--text-quaternary);padding:2rem;">No deals closing in the next 30 days</td></tr>';
      } else {
        closing.forEach(function(d) {
          var days = daysUntil(d.closingDate);
          var badgeClass = days < 10 ? "red" : days < 20 ? "amber" : "green";
          var rowClass = days < 10 ? "urgent" : "";
          var stageLabel = DEAL_STAGES.find(function(s) { return s.id === d.stage; });

          html += '<tr class="' + rowClass + '">' +
            '<td>' + d.name + '</td>' +
            '<td>' + (stageLabel ? stageLabel.label : d.stage) + '</td>' +
            '<td class="mono">' + formatDate(d.closingDate) + '</td>' +
            '<td><span class="days-badge ' + badgeClass + '">' + days + 'd</span></td>' +
            '<td><span class="priority-dot priority-' + d.priority + '" style="display:inline-block;width:8px;height:8px;border-radius:50%;"></span></td>' +
          '</tr>';
        });
      }

      document.getElementById("closingTableBody").innerHTML = html;
    }

    // Render activity feed
    function renderActivity() {
      var deals = dealsGetAll();
      var allActivity = [];

      deals.forEach(function(d) {
        if (d.activity) {
          d.activity.forEach(function(a) {
            allActivity.push({ deal: d, activity: a });
          });
        }
      });

      allActivity.sort(function(a, b) {
        return new Date(b.activity.date) - new Date(a.activity.date);
      });

      var recent = allActivity.slice(0, 10);
      var html = "";

      var icons = {
        note: "message-square",
        call: "phone",
        email: "mail",
        stage_change: "arrow-right",
        document: "paperclip",
        offer: "dollar-sign"
      };

      if (recent.length === 0) {
        html = '<div style="text-align:center;color:var(--text-quaternary);padding:2rem;">No recent activity</div>';
      } else {
        recent.forEach(function(item) {
          var icon = icons[item.activity.type] || "activity";
          html += '<div class="activity-item">' +
            '<div class="activity-icon ' + item.activity.type + '"><i data-lucide="' + icon + '" style="width:14px;height:14px;"></i></div>' +
            '<div class="activity-content">' +
              '<div class="activity-deal">' + item.deal.name + '</div>' +
              '<div class="activity-text">' + item.activity.text + '</div>' +
              '<div class="activity-time">' + formatDate(item.activity.date) + '</div>' +
            '</div>' +
          '</div>';
        });
      }

      document.getElementById("activityFeed").innerHTML = html;
      initLucide(); // Re-render icons
    }

    document.addEventListener("DOMContentLoaded", function() {
      // Restore theme
      try {
        var saved = localStorage.getItem("parcyl-theme");
        if (saved === "light" || saved === "dark") _currentMode = saved;
      } catch(e) {}

      // Apply theme
      applyTheme(getTheme());

      // Render nav with Dashboard active
      renderNav("dashboard", null, null);

      // Init Lucide
      initLucide();

      // Render dashboard sections
      renderStats();
      renderPipeline();
      renderClosingSoon();
      renderActivity();
    });
  </script>
</body>
</html>
