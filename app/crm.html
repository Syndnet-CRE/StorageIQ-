          '<div class="doc-name">' + (doc.name || "Document") + '</div>' +
          '<div class="doc-meta">' + formatDate(doc.uploadedAt) + '</div>' +
        '</div>' +
        '<div class="doc-actions">' +
          '<button class="doc-action-btn"><i data-lucide="download"></i></button>' +
          '<button class="doc-action-btn"><i data-lucide="trash-2"></i></button>' +
        '</div>' +
      '</div>';
    }
    html += '</div>';
  }
  return html;
}

function renderActivityTab(deal) {
  var html = '<div style="margin-bottom:1rem">' +
    '<div class="field" style="margin-bottom:0.5rem">' +
      '<label>Log Activity</label>' +
      '<div class="fg2" style="gap:0.5rem">' +
        '<select id="activityType">' +
          '<option value="note">Note</option>' +
          '<option value="call">Call</option>' +
          '<option value="email">Email</option>' +
          '<option value="document">Document</option>' +
          '<option value="offer">Offer</option>' +
        '</select>' +
        '<input type="text" id="activityText" placeholder="Activity description...">' +
      '</div>' +
    '</div>' +
    '<button class="btn-save" onclick="logActivity()">Log Activity</button>' +
  '</div>';

  if (!deal.activity || deal.activity.length === 0) {
    html += '<div class="empty-state">' +
      '<div class="empty-state-icon"><i data-lucide="activity" style="width:32px;height:32px"></i></div>' +
      '<div class="empty-state-text">No activity logged</div>' +
    '</div>';
  } else {
    html += '<div class="activity-feed">';
    for (var i = 0; i < deal.activity.length; i++) {
      var act = deal.activity[i];
      var iconType = act.type || "note";
      html += '<div class="activity-item">' +
        '<div class="activity-icon ' + iconType + '"><i data-lucide="' + getActivityIcon(iconType) + '"></i></div>' +
        '<div class="activity-content">' +
          '<div class="activity-text">' + (act.text || act.type) + '</div>' +
          '<div class="activity-meta">' + formatDate(act.timestamp) + '</div>' +
        '</div>' +
      '</div>';
    }
    html += '</div>';
  }
  return html;
}

function getActivityIcon(type) {
  var icons = {
    note: "sticky-note",
    call: "phone",
    email: "mail",
    stage_change: "git-branch",
    document: "file-text",
    offer: "dollar-sign"
  };
  return icons[type] || "circle";
}

function logActivity() {
  var type = document.getElementById("activityType")?.value || "note";
  var text = document.getElementById("activityText")?.value || "";
  if (!text.trim()) return;

  dealsAddActivity(crmState.selectedDealId, type, text);
  var deal = dealsGetById(crmState.selectedDealId);
  if (deal) renderDetailPanelContent(deal);
}

function renderFinancialsTab(deal) {
  if (!deal.financials || Object.keys(deal.financials).length === 0) {
    return '<div class="empty-state">' +
      '<div class="empty-state-icon"><i data-lucide="calculator" style="width:48px;height:48px"></i></div>' +
      '<div class="empty-state-text">Run underwriting in the Underwriter tab to populate financials</div>' +
      '<a href="index.html" class="btn-primary" style="display:inline-block;margin-top:1rem;text-decoration:none;">Go to Underwriter</a>' +
    '</div>';
  }

  var f = deal.financials;
  return '<div class="detail-section">' +
    '<div class="detail-section-title">Key Metrics</div>' +
    '<div class="fg3">' +
      '<div class="stat-card"><div class="stat-label">NOI</div><div class="stat-value green">' + formatCurrency(f.noi) + '</div></div>' +
      '<div class="stat-card"><div class="stat-label">Cap Rate</div><div class="stat-value">' + (f.capRate || "—") + '</div></div>' +
      '<div class="stat-card"><div class="stat-label">DSCR</div><div class="stat-value">' + (f.dscr || "—") + '</div></div>' +
    '</div>' +
  '</div>';
}

/* ══════════════════════════════════════════════════════
   SCORECARD TAB
══════════════════════════════════════════════════════ */
function renderScorecardTab(deal) {
  var f = deal.financials || {};
  var lc = f.lastCalc || {};
  var today = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

  // Helper for safe number formatting
  function fmt(val, decimals) {
    if (val === null || val === undefined || val === '' || isNaN(val)) return '—';
    return parseFloat(val).toLocaleString('en-US', { minimumFractionDigits: decimals || 0, maximumFractionDigits: decimals || 0 });
  }
  function pct(val, decimals) {
    if (val === null || val === undefined || val === '' || isNaN(val)) return '—';
    return parseFloat(val).toFixed(decimals || 1) + '%';
  }
  function curr(val) {
    if (val === null || val === undefined || val === '' || isNaN(val)) return '—';
    var num = parseFloat(val);
    if (num >= 1000000) return '$' + (num / 1000000).toFixed(2) + 'm';
    return '$' + num.toLocaleString('en-US', { maximumFractionDigits: 0 });
  }

  // Section style wrapper
  var sectionStyle = 'margin-bottom:2rem;background:var(--bg-primary);border-radius:0.75rem;border:1px solid var(--border-subtle);overflow:hidden;padding:1.25rem;';
  var headingStyle = 'font-size:0.6rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-quaternary);border-bottom:1px solid var(--border-subtle);margin-bottom:0.75rem;padding-bottom:0.5rem;';
  var tableStyle = 'width:100%;border-collapse:collapse;font-size:0.78rem;';
  var thStyle = 'text-align:left;padding:0.5rem 0.75rem;font-size:0.58rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-quaternary);border-bottom:1px solid var(--border-subtle);background:var(--bg-tertiary);';
  var tdStyle = 'padding:0.6rem 0.75rem;border-bottom:1px solid var(--border-subtle);color:var(--text-secondary);';
  var tdMono = 'padding:0.6rem 0.75rem;border-bottom:1px solid var(--border-subtle);color:var(--text-primary);font-family:var(--font-mono);';
  var tdLabel = 'padding:0.6rem 0.75rem;border-bottom:1px solid var(--border-subtle);color:var(--text-tertiary);font-size:0.72rem;';
  var noiRowStyle = 'background:var(--accent-primaryMuted);font-weight:700;';

  var html = '';

  // ═══════════════════════════════════════════════════════════
  // SECTION 0: Header bar
  // ═══════════════════════════════════════════════════════════
  html += '<div class="scorecard-section" style="' + sectionStyle + 'display:flex;justify-content:space-between;align-items:flex-start;">' +
    '<div>' +
      '<h2 style="font-size:1.25rem;font-weight:700;color:var(--text-primary);margin-bottom:0.25rem;">' + (deal.propertyName || 'Untitled Deal') + '</h2>' +
      '<p style="font-size:0.78rem;color:var(--text-tertiary);margin-bottom:0.15rem;">' +
        (deal.address || '') + (deal.address && deal.city ? ', ' : '') + (deal.city || '') + (deal.city && deal.state ? ', ' : '') + (deal.state || '') +
      '</p>' +
      '<p style="font-size:0.65rem;color:var(--text-quaternary);">Generated: ' + today + '</p>' +
    '</div>' +
    '<button onclick="window.print()" style="display:flex;align-items:center;gap:0.4rem;background:var(--bg-tertiary);border:1px solid var(--border-default);color:var(--text-secondary);padding:0.5rem 1rem;border-radius:0.5rem;font-size:0.7rem;font-weight:600;cursor:pointer;transition:all 0.15s;">' +
      '<i data-lucide="printer" style="width:14px;height:14px;"></i> Export / Print PDF' +
    '</button>' +
  '</div>';

  // ═══════════════════════════════════════════════════════════
  // SECTION 1: Acquisition Summary
  // ═══════════════════════════════════════════════════════════
  var purchasePrice = deal.askingPrice || lc.purchasePrice || 0;
  var closingCostPct = lc.closingCostPct || 2;
  var closingCosts = purchasePrice * (closingCostPct / 100);
  var hardSoftCosts = lc.hardSoftCosts || 0;
  var totalBasis = purchasePrice + closingCosts + hardSoftCosts;
  var loanAmount = lc.loanAmount || (purchasePrice * 0.7);
  var ltv = purchasePrice > 0 ? (loanAmount / purchasePrice) * 100 : 0;
  var equityRequired = totalBasis - loanAmount;
  var equityPct = totalBasis > 0 ? (equityRequired / totalBasis) * 100 : 0;

  html += '<div class="scorecard-section" style="' + sectionStyle + '">' +
    '<div style="' + headingStyle + '">Acquisition Summary</div>' +
    '<table style="' + tableStyle + '">' +
      '<tr><td style="' + tdLabel + '">Purchase Price</td><td style="' + tdMono + '">' + curr(purchasePrice) + '</td></tr>' +
      '<tr><td style="' + tdLabel + '">Closing Costs (' + pct(closingCostPct, 1) + ')</td><td style="' + tdMono + '">' + curr(closingCosts) + '</td></tr>' +
      '<tr><td style="' + tdLabel + '">Hard/Soft Costs</td><td style="' + tdMono + '">' + curr(hardSoftCosts) + '</td></tr>' +
      '<tr style="font-weight:600;"><td style="' + tdLabel + 'font-weight:600;">Total Basis</td><td style="' + tdMono + '">' + curr(totalBasis) + '</td></tr>' +
      '<tr><td style="' + tdLabel + '">Loan Amount</td><td style="' + tdMono + '">' + curr(loanAmount) + '</td></tr>' +
      '<tr><td style="' + tdLabel + '">LTV %</td><td style="' + tdMono + '">' + pct(ltv, 1) + '</td></tr>' +
      '<tr><td style="' + tdLabel + '">Equity Required</td><td style="' + tdMono + 'color:var(--semantic-success);">' + curr(equityRequired) + '</td></tr>' +
      '<tr><td style="' + tdLabel + '">Equity as % of Basis</td><td style="' + tdMono + '">' + pct(equityPct, 1) + '</td></tr>' +
    '</table>' +
  '</div>';

  // ═══════════════════════════════════════════════════════════
  // SECTION 2: Unit Mix
  // ═══════════════════════════════════════════════════════════
  var unitMix = f.unitMix || [];
  html += '<div class="scorecard-section" style="' + sectionStyle + '">' +
    '<div style="' + headingStyle + '">Unit Mix</div>' +
    '<table style="' + tableStyle + '">' +
      '<thead><tr>' +
        '<th style="' + thStyle + '">Type</th>' +
        '<th style="' + thStyle + 'text-align:right;">Size (SF)</th>' +
        '<th style="' + thStyle + 'text-align:right;">Units</th>' +
        '<th style="' + thStyle + 'text-align:right;">Occ %</th>' +
        '<th style="' + thStyle + 'text-align:right;">Rent/SF</th>' +
        '<th style="' + thStyle + 'text-align:right;">Mo. GSR</th>' +
        '<th style="' + thStyle + 'text-align:right;">Ann. GSR</th>' +
        '<th style="' + thStyle + 'text-align:right;">% of Total</th>' +
      '</tr></thead>' +
      '<tbody>';

  var totalUnits = 0, totalAnnGSR = 0, totalSF = 0;
  for (var u = 0; u < unitMix.length; u++) {
    var unit = unitMix[u];
    var unitCount = parseFloat(unit.units) || 0;
    var unitSF = parseFloat(unit.size) || 0;
    var unitOcc = parseFloat(unit.occupancy) || 0;
    var rentPerSF = parseFloat(unit.rentPerSF) || 0;
    var moGSR = unitCount * unitSF * rentPerSF;
    var annGSR = moGSR * 12;
    totalUnits += unitCount;
    totalAnnGSR += annGSR;
    totalSF += unitCount * unitSF;

    html += '<tr>' +
      '<td style="' + tdStyle + '">' + (unit.type || 'Unit ' + (u+1)) + '</td>' +
      '<td style="' + tdMono + 'text-align:right;">' + fmt(unitSF) + '</td>' +
      '<td style="' + tdMono + 'text-align:right;">' + fmt(unitCount) + '</td>' +
      '<td style="' + tdMono + 'text-align:right;">' + pct(unitOcc) + '</td>' +
      '<td style="' + tdMono + 'text-align:right;">$' + fmt(rentPerSF, 2) + '</td>' +
      '<td style="' + tdMono + 'text-align:right;">' + curr(moGSR) + '</td>' +
      '<td style="' + tdMono + 'text-align:right;">' + curr(annGSR) + '</td>' +
      '<td style="' + tdMono + 'text-align:right;">' + (totalAnnGSR > 0 ? pct((annGSR/totalAnnGSR)*100, 1) : '—') + '</td>' +
    '</tr>';
  }

  if (unitMix.length === 0) {
    html += '<tr><td colspan="8" style="' + tdStyle + 'text-align:center;color:var(--text-quaternary);">No unit mix data — run underwriting to populate</td></tr>';
  } else {
    var avgRentPerSF = totalSF > 0 ? (totalAnnGSR / 12) / totalSF : 0;
    html += '<tr style="font-weight:600;background:var(--bg-tertiary);">' +
      '<td style="' + tdStyle + 'font-weight:600;">TOTALS</td>' +
      '<td style="' + tdMono + 'text-align:right;">—</td>' +
      '<td style="' + tdMono + 'text-align:right;">' + fmt(totalUnits) + '</td>' +
      '<td style="' + tdMono + 'text-align:right;">—</td>' +
      '<td style="' + tdMono + 'text-align:right;">$' + fmt(avgRentPerSF, 2) + '</td>' +
      '<td style="' + tdMono + 'text-align:right;">' + curr(totalAnnGSR/12) + '</td>' +
      '<td style="' + tdMono + 'text-align:right;">' + curr(totalAnnGSR) + '</td>' +
      '<td style="' + tdMono + 'text-align:right;">100%</td>' +
    '</tr>';
  }

  html += '</tbody></table></div>';

  // ═══════════════════════════════════════════════════════════
  // SECTION 3: Income Statement
  // ═══════════════════════════════════════════════════════════
  var gsr = lc.grossScheduledRent || totalAnnGSR || 0;
  var vacancyPct = lc.vacancyPct || 10;
  var vacancyLoss = gsr * (vacancyPct / 100);
  var otherIncome = lc.otherIncome || 0;
  var egr = gsr - vacancyLoss + otherIncome;
  var mgmtFeePct = lc.mgmtFeePct || 6;
  var mgmtFee = egr * (mgmtFeePct / 100);
  var propTaxes = lc.propertyTaxes || 0;
  var insurance = lc.insurance || 0;
  var maintenance = lc.maintenance || 0;
  var utilities = lc.utilities || 0;
  var reserves = lc.reserves || 0;
  var totalOpex = mgmtFee + propTaxes + insurance + maintenance + utilities + reserves;
  var opexRatio = egr > 0 ? (totalOpex / egr) * 100 : 0;
  var noi = egr - totalOpex;
  var capRate = purchasePrice > 0 ? (noi / purchasePrice) * 100 : 0;
  var yieldOnCost = totalBasis > 0 ? (noi / totalBasis) * 100 : 0;

  html += '<div class="scorecard-section" style="' + sectionStyle + '">' +
    '<div style="' + headingStyle + '">Income Statement</div>' +
    '<table style="' + tableStyle + '">' +
      '<tr><td style="' + tdLabel + '">Gross Scheduled Rent</td><td style="' + tdMono + '">' + curr(gsr) + '</td></tr>' +
      '<tr><td style="' + tdLabel + '">− Vacancy Loss (' + pct(vacancyPct, 1) + ')</td><td style="' + tdMono + 'color:var(--semantic-error);">(' + curr(vacancyLoss) + ')</td></tr>' +
      '<tr><td style="' + tdLabel + '">+ Other Income</td><td style="' + tdMono + '">' + curr(otherIncome) + '</td></tr>' +
      '<tr style="font-weight:600;"><td style="' + tdLabel + 'font-weight:600;">= Effective Gross Revenue</td><td style="' + tdMono + '">' + curr(egr) + '</td></tr>' +
      '<tr><td style="' + tdLabel + '">− Management Fee (' + pct(mgmtFeePct, 1) + ')</td><td style="' + tdMono + '">(' + curr(mgmtFee) + ')</td></tr>' +
      '<tr><td style="' + tdLabel + '">− Property Taxes</td><td style="' + tdMono + '">(' + curr(propTaxes) + ')</td></tr>' +
      '<tr><td style="' + tdLabel + '">− Insurance</td><td style="' + tdMono + '">(' + curr(insurance) + ')</td></tr>' +
      '<tr><td style="' + tdLabel + '">− Maintenance</td><td style="' + tdMono + '">(' + curr(maintenance) + ')</td></tr>' +
      '<tr><td style="' + tdLabel + '">− Utilities</td><td style="' + tdMono + '">(' + curr(utilities) + ')</td></tr>' +
      '<tr><td style="' + tdLabel + '">− Reserves</td><td style="' + tdMono + '">(' + curr(reserves) + ')</td></tr>' +
      '<tr style="font-weight:600;"><td style="' + tdLabel + 'font-weight:600;">= Total Operating Expenses</td><td style="' + tdMono + '">(' + curr(totalOpex) + ')</td></tr>' +
      '<tr><td style="' + tdLabel + '">OpEx Ratio</td><td style="' + tdMono + '">' + pct(opexRatio, 1) + '</td></tr>' +
      '<tr style="' + noiRowStyle + '"><td style="' + tdLabel + 'font-weight:700;color:var(--text-primary);">= NET OPERATING INCOME</td><td style="' + tdMono + 'color:var(--semantic-success);font-weight:700;">' + curr(noi) + '</td></tr>' +
      '<tr><td style="' + tdLabel + '">Cap Rate (NOI / Purchase Price)</td><td style="' + tdMono + '">' + pct(capRate, 2) + '</td></tr>' +
      '<tr><td style="' + tdLabel + '">Yield on Cost (NOI / Total Basis)</td><td style="' + tdMono + '">' + pct(yieldOnCost, 2) + '</td></tr>' +
    '</table>' +
  '</div>';

  // ═══════════════════════════════════════════════════════════
  // SECTION 4: Debt & Returns
  // ═══════════════════════════════════════════════════════════
  var intRate = lc.interestRate || 7;
  var amortYrs = lc.amortization || 25;
  var ioPeriod = lc.ioPeriod || 0;
  var monthlyPmt = lc.monthlyPayment || 0;
  var annualDS = monthlyPmt * 12;
  var dscr = annualDS > 0 ? noi / annualDS : 0;
  var debtYield = loanAmount > 0 ? (noi / loanAmount) * 100 : 0;
  var cashFlowAfterDS = noi - annualDS;
  var coc = equityRequired > 0 ? (cashFlowAfterDS / equityRequired) * 100 : 0;
  var equityMult = lc.equityMultiple || '—';

  html += '<div class="scorecard-section" style="' + sectionStyle + '">' +
    '<div style="' + headingStyle + '">Debt & Returns</div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;">' +
      '<div>' +
        '<div style="font-size:0.55rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-quaternary);margin-bottom:0.5rem;">Debt Structure</div>' +
        '<table style="' + tableStyle + '">' +
          '<tr><td style="' + tdLabel + '">Loan Amount</td><td style="' + tdMono + '">' + curr(loanAmount) + '</td></tr>' +
          '<tr><td style="' + tdLabel + '">Interest Rate</td><td style="' + tdMono + '">' + pct(intRate, 2) + '</td></tr>' +
          '<tr><td style="' + tdLabel + '">Amortization</td><td style="' + tdMono + '">' + fmt(amortYrs) + ' yrs</td></tr>' +
          '<tr><td style="' + tdLabel + '">IO Period</td><td style="' + tdMono + '">' + fmt(ioPeriod) + ' yrs</td></tr>' +
          '<tr><td style="' + tdLabel + '">Monthly Payment</td><td style="' + tdMono + '">' + curr(monthlyPmt) + '</td></tr>' +
          '<tr><td style="' + tdLabel + '">Annual Debt Service</td><td style="' + tdMono + '">' + curr(annualDS) + '</td></tr>' +
          '<tr><td style="' + tdLabel + '">DSCR</td><td style="' + tdMono + (dscr >= 1.25 ? 'color:var(--semantic-success);' : dscr >= 1.0 ? 'color:var(--semantic-warning);' : 'color:var(--semantic-error);') + '">' + fmt(dscr, 2) + 'x</td></tr>' +
          '<tr><td style="' + tdLabel + '">Debt Yield</td><td style="' + tdMono + '">' + pct(debtYield, 2) + '</td></tr>' +
        '</table>' +
      '</div>' +
      '<div>' +
        '<div style="font-size:0.55rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-quaternary);margin-bottom:0.5rem;">Returns</div>' +
        '<table style="' + tableStyle + '">' +
          '<tr><td style="' + tdLabel + '">Purchase Price</td><td style="' + tdMono + '">' + curr(purchasePrice) + '</td></tr>' +
          '<tr><td style="' + tdLabel + '">Total Equity</td><td style="' + tdMono + '">' + curr(equityRequired) + '</td></tr>' +
          '<tr><td style="' + tdLabel + '">Cash Flow After DS</td><td style="' + tdMono + (cashFlowAfterDS >= 0 ? 'color:var(--semantic-success);' : 'color:var(--semantic-error);') + '">' + curr(cashFlowAfterDS) + '</td></tr>' +
          '<tr><td style="' + tdLabel + '">Cash-on-Cash Return</td><td style="' + tdMono + 'color:var(--semantic-success);">' + pct(coc, 2) + '</td></tr>' +
          '<tr><td style="' + tdLabel + '">Equity Multiple (est.)</td><td style="' + tdMono + '">' + (typeof equityMult === 'number' ? fmt(equityMult, 2) + 'x' : equityMult) + '</td></tr>' +
          '<tr><td style="' + tdLabel + '">Cap Rate</td><td style="' + tdMono + '">' + pct(capRate, 2) + '</td></tr>' +
          '<tr><td style="' + tdLabel + '">Yield on Cost</td><td style="' + tdMono + '">' + pct(yieldOnCost, 2) + '</td></tr>' +
        '</table>' +
      '</div>' +
    '</div>' +
  '</div>';

  // ═══════════════════════════════════════════════════════════
  // SECTION 5: Three Offer Scenarios
  // ═══════════════════════════════════════════════════════════
  var scenarios = f.scenarios || [];
  var defaultScenarios = [
    { name: 'Bank Loan', ltv: 70, rate: 7.0, io: 0 },
    { name: 'Seller Fin.', ltv: 80, rate: 6.0, io: 2 },
    { name: 'Interest Only', ltv: 75, rate: 6.5, io: 5 }
  ];
  if (scenarios.length === 0) scenarios = defaultScenarios;

  html += '<div class="scorecard-section" style="' + sectionStyle + '">' +
    '<div style="' + headingStyle + '">Three Offer Scenarios</div>' +
    '<table style="' + tableStyle + '">' +
      '<thead><tr>' +
        '<th style="' + thStyle + '">Metric</th>';

  for (var s = 0; s < scenarios.length; s++) {
    html += '<th style="' + thStyle + 'text-align:right;">' + (scenarios[s].name || 'Scenario ' + (s+1)) + '</th>';
  }
  html += '</tr></thead><tbody>';

  // Calculate each scenario
  var scenarioData = [];
  for (var sc = 0; sc < scenarios.length; sc++) {
    var scen = scenarios[sc];
    var sLtv = scen.ltv || 70;
    var sLoan = purchasePrice * (sLtv / 100);
    var sRate = scen.rate || 7;
    var sIo = scen.io || 0;
    var sMonthlyRate = sRate / 100 / 12;
    var sNumPayments = (amortYrs || 25) * 12;
    var sMonthlyPmt = sIo > 0 ? (sLoan * sMonthlyRate) : (sLoan * sMonthlyRate * Math.pow(1 + sMonthlyRate, sNumPayments)) / (Math.pow(1 + sMonthlyRate, sNumPayments) - 1);
    var sAnnualDS = sMonthlyPmt * 12;
    var sDscr = sAnnualDS > 0 ? noi / sAnnualDS : 0;
    var sEquity = totalBasis - sLoan;
    var sCashFlow = noi - sAnnualDS;
    var sCoc = sEquity > 0 ? (sCashFlow / sEquity) * 100 : 0;
    scenarioData.push({ ltv: sLtv, loan: sLoan, rate: sRate, io: sIo, monthly: sMonthlyPmt, annual: sAnnualDS, dscr: sDscr, equity: sEquity, coc: sCoc });
  }

  var rows = [
    { label: 'Offer Price', key: 'price' },
    { label: 'LTV %', key: 'ltv' },
    { label: 'Loan Amount', key: 'loan' },
    { label: 'Interest Rate', key: 'rate' },
    { label: 'IO Period', key: 'io' },
    { label: 'Monthly Payment', key: 'monthly' },
    { label: 'Annual Debt Service', key: 'annual' },
    { label: 'DSCR', key: 'dscr' },
    { label: 'Equity Required', key: 'equity' },
    { label: 'Cash-on-Cash Return', key: 'coc' }
  ];

  for (var r = 0; r < rows.length; r++) {
    var row = rows[r];
    html += '<tr><td style="' + tdLabel + '">' + row.label + '</td>';
    for (var sd = 0; sd < scenarioData.length; sd++) {
      var d = scenarioData[sd];
      var val = '';
      if (row.key === 'price') val = curr(purchasePrice);
      else if (row.key === 'ltv') val = pct(d.ltv, 1);
      else if (row.key === 'loan') val = curr(d.loan);
      else if (row.key === 'rate') val = pct(d.rate, 2);
      else if (row.key === 'io') val = fmt(d.io) + ' yrs';
      else if (row.key === 'monthly') val = curr(d.monthly);
      else if (row.key === 'annual') val = curr(d.annual);
      else if (row.key === 'dscr') val = fmt(d.dscr, 2) + 'x';
      else if (row.key === 'equity') val = curr(d.equity);
      else if (row.key === 'coc') val = pct(d.coc, 2);
      html += '<td style="' + tdMono + 'text-align:right;">' + val + '</td>';
    }
    html += '</tr>';
  }

  html += '</tbody></table></div>';

  // ═══════════════════════════════════════════════════════════
  // SECTION 6: Market Context
  // ═══════════════════════════════════════════════════════════
  var comps = deal.marketComps || [];
  html += '<div class="scorecard-section" style="' + sectionStyle + '">' +
    '<div style="' + headingStyle + '">Market Context</div>' +
    '<table style="' + tableStyle + '">' +
      '<thead><tr>' +
        '<th style="' + thStyle + '">Facility</th>' +
        '<th style="' + thStyle + 'text-align:right;">Distance</th>' +
        '<th style="' + thStyle + 'text-align:right;">Est. Units</th>' +
        '<th style="' + thStyle + 'text-align:right;">Occ %</th>' +
        '<th style="' + thStyle + 'text-align:right;">Avg Rent/SF</th>' +
      '</tr></thead>' +
      '<tbody>';

  if (comps.length === 0) {
    html += '<tr><td colspan="5" style="' + tdStyle + 'text-align:center;color:var(--text-quaternary);">Run Market Map to populate competing facility data</td></tr>';
  } else {
    for (var c = 0; c < comps.length; c++) {
      var comp = comps[c];
      html += '<tr>' +
        '<td style="' + tdStyle + '">' + (comp.name || 'Competitor ' + (c+1)) + '</td>' +
        '<td style="' + tdMono + 'text-align:right;">' + (comp.distance ? fmt(comp.distance, 1) + ' mi' : '—') + '</td>' +
        '<td style="' + tdMono + 'text-align:right;">' + (comp.units ? fmt(comp.units) : '—') + '</td>' +
        '<td style="' + tdMono + 'text-align:right;">' + (comp.occupancy ? pct(comp.occupancy) : '—') + '</td>' +
        '<td style="' + tdMono + 'text-align:right;">' + (comp.avgRent ? '$' + fmt(comp.avgRent, 2) : '—') + '</td>' +
      '</tr>';
    }
  }

  html += '</tbody></table>' +
    '<p style="font-size:0.6rem;color:var(--text-quaternary);margin-top:0.75rem;font-style:italic;">Market data sourced from OpenStreetMap via Overpass API</p>' +
  '</div>';

  return html;
}

/* ══════════════════════════════════════════════════════
   ADD DEAL MODAL
══════════════════════════════════════════════════════ */
function renderAddDealModal() {
  var overlay = document.getElementById("modalOverlay");
  var content = document.getElementById("modalContent");
  if (!overlay || !content) return;

  content.innerHTML = '<div class="modal-header">' +
    '<h3>Add New Deal</h3>' +
    '<button class="modal-close" onclick="closeModal()"><i data-lucide="x"></i></button>' +
  '</div>' +
  '<div class="modal-body">' +
    '<div class="fg2" style="margin-bottom:0.65rem;">' +
      '<div class="field"><label>Property Name</label><input type="text" id="newPropName" placeholder="e.g. Metro Self Storage"></div>' +
      '<div class="field"><label>Address</label><input type="text" id="newAddress" placeholder="123 Main St"></div>' +
    '</div>' +
    '<div class="fg3" style="margin-bottom:0.65rem;">' +
      '<div class="field"><label>City</label><input type="text" id="newCity"></div>' +
      '<div class="field"><label>State</label><input type="text" id="newState" maxlength="2"></div>' +
      '<div class="field"><label>Asking Price</label><input type="text" id="newPrice" placeholder="1500000"></div>' +
    '</div>' +
    '<div class="fg2">' +
      '<div class="field"><label>Priority</label><select id="newPriority"><option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option></select></div>' +
      '<div class="field"><label>Stage</label><select id="newStage"><option value="prospecting" selected>Prospecting</option><option value="outreach">Outreach</option><option value="under_loi">Under LOI</option><option value="under_contract">Under Contract</option><option value="closing">Closing</option></select></div>' +
    '</div>' +
  '</div>' +
  '<div class="modal-footer">' +
    '<button class="btn-secondary" onclick="closeModal()">Cancel</button>' +
    '<button class="btn-save" onclick="createNewDeal()">Create Deal</button>' +
  '</div>';

  overlay.classList.add("open");
  initLucide();
}

function closeModal() {
  var overlay = document.getElementById("modalOverlay");
  if (overlay) overlay.classList.remove("open");
}

function createNewDeal() {
  var deal = dealsCreate({
    propertyName: document.getElementById("newPropName")?.value || "",
    address: document.getElementById("newAddress")?.value || "",
    city: document.getElementById("newCity")?.value || "",
    state: document.getElementById("newState")?.value || "",
    askingPrice: parseFloat(document.getElementById("newPrice")?.value) || 0,
    priority: document.getElementById("newPriority")?.value || "medium",
    stage: document.getElementById("newStage")?.value || "prospecting"
  });

  dealsAddActivity(deal.id, "note", "Deal created");
  closeModal();
  renderTable();
  renderSidebar();
}

/* ══════════════════════════════════════════════════════
   INIT CRM
══════════════════════════════════════════════════════ */
function initCRM() {
  seedDeals();
  renderSidebar();
}
  </script>
  <script>
    /* ══════════════════════════════════════════════════════
       PIPELINE TABLE FUNCTIONS
    ══════════════════════════════════════════════════════ */
    var PIPELINE_STAGES = [
      { id: "prospecting", label: "Prospecting", color: "#0A84FF" },
      { id: "outreach", label: "Outreach", color: "#5AC8FA" },
      { id: "under_loi", label: "LOI", color: "#FFD60A" },
      { id: "under_contract", label: "Under Contract", color: "#FF9F0A" },
      { id: "closing", label: "Closing", color: "#34C759" }
    ];

    function getStageIndex(stageId) {
      for (var i = 0; i < PIPELINE_STAGES.length; i++) {
        if (PIPELINE_STAGES[i].id === stageId) return i;
      }
      return 0;
    }

    function getPipelineStageLabel(stageId) {
      for (var i = 0; i < PIPELINE_STAGES.length; i++) {
        if (PIPELINE_STAGES[i].id === stageId) return PIPELINE_STAGES[i].label;
      }
      return stageId;
    }

    function getPipelineStageColor(stageId) {
      for (var i = 0; i < PIPELINE_STAGES.length; i++) {
        if (PIPELINE_STAGES[i].id === stageId) return PIPELINE_STAGES[i].color;
      }
      return "#888";
    }

    function renderTable() {
      var deals = dealsGetAll();
      var tbody = document.getElementById("pipelineTableBody");
      var kpisDiv = document.getElementById("pipelineKpis");
      if (!tbody) return;

      // Calculate KPIs
      var activeDeals = deals.filter(function(d) { return d.stage !== "dead" && d.stage !== "closed"; });
      var totalPipeline = 0;
      var avgPrice = 0;
      for (var i = 0; i < activeDeals.length; i++) {
        totalPipeline += parseFloat(activeDeals[i].askingPrice) || 0;
      }
      if (activeDeals.length > 0) {
        avgPrice = totalPipeline / activeDeals.length;
      }

      // Render KPIs
      if (kpisDiv) {
        kpisDiv.innerHTML =
          '<div class="pipeline-kpi">' +
            '<div class="pipeline-kpi-label">Total Pipeline</div>' +
            '<div class="pipeline-kpi-value green">' + formatCurrency(totalPipeline) + '</div>' +
          '</div>' +
          '<div class="pipeline-kpi">' +
            '<div class="pipeline-kpi-label">Active Deals</div>' +
            '<div class="pipeline-kpi-value">' + activeDeals.length + '</div>' +
          '</div>' +
          '<div class="pipeline-kpi">' +
            '<div class="pipeline-kpi-label">Avg Price</div>' +
            '<div class="pipeline-kpi-value">' + formatCurrency(avgPrice) + '</div>' +
          '</div>';
      }

      // Render table rows
      var html = "";
      for (var j = 0; j < deals.length; j++) {
        var deal = deals[j];
        if (deal.stage === "dead") continue;

        var priorityColor = getPriorityColor(deal.priority);
        var stageColor = getPipelineStageColor(deal.stage);
        var daysInStage = getDaysInStage(deal);
        var lastActivity = deal.activity && deal.activity.length > 0 ? deal.activity[0] : null;
        var lastActivityText = lastActivity ? formatDate(lastActivity.timestamp) : "—";
        var isSelected = crmState.selectedDealId === deal.id;

        // Estimate NOI and cap rate (placeholder since we don't have full financials)
        var noi = deal.noi || "—";
        var capRate = deal.capRate || "—";

        html += '<tr class="' + (isSelected ? 'active' : '') + '" onclick="openDeal(\'' + deal.id + '\')">' +
          '<td>' +
            '<div class="deal-cell">' +
              '<div class="deal-cell-priority" style="background:' + priorityColor + '"></div>' +
              '<div class="deal-cell-info">' +
                '<div class="deal-cell-name">' + (deal.propertyName || "Untitled") + '</div>' +
                '<div class="deal-cell-location">' + (deal.city || "") + (deal.city && deal.state ? ", " : "") + (deal.state || "") + '</div>' +
              '</div>' +
            '</div>' +
          '</td>' +
          '<td><span class="stage-badge" style="background:' + stageColor + '20;color:' + stageColor + '">' + getPipelineStageLabel(deal.stage) + '</span></td>' +
          '<td class="mono right">' + formatCurrency(deal.askingPrice) + '</td>' +
          '<td class="mono right">' + noi + '</td>' +
          '<td class="mono right">' + capRate + '</td>' +
          '<td class="mono right">' + daysInStage + 'd</td>' +
          '<td>' + lastActivityText + '</td>' +
          '<td>' +
            '<div class="actions-cell">' +
              '<button class="action-btn open" onclick="event.stopPropagation();openDeal(\'' + deal.id + '\')">Open</button>' +
              '<button class="action-btn advance" onclick="event.stopPropagation();quickAdvance(\'' + deal.id + '\')"><i data-lucide="chevron-right" style="width:12px;height:12px"></i></button>' +
            '</div>' +
          '</td>' +
        '</tr>';
      }

      tbody.innerHTML = html;
      initLucide();
    }

    function quickAdvance(id) {
      var deal = dealsGetById(id);
      if (!deal) return;

      var currentIndex = getStageIndex(deal.stage);
      if (currentIndex < PIPELINE_STAGES.length - 1) {
        var nextStage = PIPELINE_STAGES[currentIndex + 1];
        deal.stage = nextStage.id;
        deal.substage = "";
        dealsUpdate(id, { stage: nextStage.id, substage: "" });
        dealsAddActivity(id, "stage_change", "Advanced to " + nextStage.label);
        renderTable();
        renderSidebar();

        // Update detail panel if open
        if (crmState.selectedDealId === id) {
          renderDetailPanelContent(deal);
        }
      }
    }

    function openDeal(id) {
      crmState.selectedDealId = id;
      crmState.activeTab = "overview";
      var deal = dealsGetById(id);
      if (!deal) return;

      renderTable();
      renderDetailPanelContent(deal);

      var panel = document.getElementById("detailPanel");
      if (panel) {
        panel.classList.add("open");
      }
    }

    function closeDetailPanel() {
      crmState.selectedDealId = null;
      var panel = document.getElementById("detailPanel");
      if (panel) {
        panel.classList.remove("open");
      }
      renderTable();
    }

    function renderAcqTimeline(deal) {
      var currentIndex = getStageIndex(deal.stage);
      var html = '<div class="acq-timeline">';

      for (var i = 0; i < PIPELINE_STAGES.length; i++) {
        var stage = PIPELINE_STAGES[i];
        var isPassed = i < currentIndex;
        var isCurrent = i === currentIndex;
        var cls = isPassed ? "passed" : (isCurrent ? "current" : "");

        // Calculate days in this stage
        var daysText = "—";
        if (isPassed || isCurrent) {
          if (isCurrent) {
            daysText = getDaysInStage(deal) + "d";
          } else {
            // For passed stages, estimate based on activity
            daysText = "done";
          }
        }

        var icon = isPassed ? "check" : (isCurrent ? "circle-dot" : "circle");

        html += '<div class="acq-timeline-node ' + cls + '">' +
          '<div class="acq-node-dot"><i data-lucide="' + icon + '"></i></div>' +
          '<div class="acq-node-label">' + stage.label + '</div>' +
          '<div class="acq-node-days">' + daysText + '</div>' +
        '</div>';
      }

      html += '</div>';
      return html;
    }

    function renderDetailKpiStrip(deal) {
      var askingPrice = formatCurrency(deal.askingPrice);
      var noi = deal.noi || "—";
      var capRate = deal.capRate || "—";
      var dscr = deal.dscr || "—";
      var coc = deal.coc || "—";

      return '<div class="detail-kpi-strip">' +
        '<div class="detail-kpi">' +
          '<div class="detail-kpi-label">Asking Price</div>' +
          '<div class="detail-kpi-value">' + askingPrice + '</div>' +
        '</div>' +
        '<div class="detail-kpi">' +
          '<div class="detail-kpi-label">NOI</div>' +
          '<div class="detail-kpi-value">' + noi + '</div>' +
        '</div>' +
        '<div class="detail-kpi">' +
          '<div class="detail-kpi-label">Cap Rate</div>' +
          '<div class="detail-kpi-value">' + capRate + '</div>' +
        '</div>' +
        '<div class="detail-kpi">' +
          '<div class="detail-kpi-label">DSCR</div>' +
          '<div class="detail-kpi-value">' + dscr + '</div>' +
        '</div>' +
        '<div class="detail-kpi">' +
          '<div class="detail-kpi-label">CoC Return</div>' +
          '<div class="detail-kpi-value">' + coc + '</div>' +
        '</div>' +
      '</div>';
    }

    function renderDetailPanelContent(deal) {
      var panel = document.getElementById("detailPanel");
      if (!panel) return;

      // Build tabs
      var tabs = ["scorecard", "overview", "timeline", "documents", "activity", "financials"];
      var tabLabels = ["Scorecard", "Overview", "Timeline", "Documents", "Activity", "Financials"];
      var tabIcons = ["bar-chart-2", "info", "calendar", "folder", "activity", "calculator"];

      var tabsHtml = '<div class="crm-detail-tabs">';
      for (var t = 0; t < tabs.length; t++) {
        var isActive = crmState.activeTab === tabs[t];
        tabsHtml += '<button class="crm-detail-tab' + (isActive ? ' active' : '') + '" onclick="switchDetailTab(\'' + tabs[t] + '\')">' +
          '<i data-lucide="' + tabIcons[t] + '"></i>' +
          '<span>' + tabLabels[t] + '</span>' +
        '</button>';
      }
      tabsHtml += '</div>';

      // Get tab content from existing crm.js functions
      var contentHtml = '';
      if (crmState.activeTab === "scorecard") {
        contentHtml = renderScorecardTab(deal);
      } else if (crmState.activeTab === "overview") {
        contentHtml = renderOverviewTab(deal);
      } else if (crmState.activeTab === "timeline") {
        contentHtml = renderTimelineTab(deal);
      } else if (crmState.activeTab === "documents") {
        contentHtml = renderDocumentsTab(deal);
      } else if (crmState.activeTab === "activity") {
        contentHtml = renderActivityTab(deal);
      } else if (crmState.activeTab === "financials") {
        contentHtml = renderFinancialsTab(deal);
      }

      panel.innerHTML =
        '<div class="crm-detail-header">' +
          '<div class="crm-detail-title">' +
            '<h2>' + (deal.propertyName || "Untitled Deal") + '</h2>' +
            '<p style="font-size:0.7rem;color:var(--text-quaternary);margin-top:0.25rem">' +
              (deal.address || "") + (deal.address && deal.city ? ", " : "") + (deal.city || "") + (deal.city && deal.state ? ", " : "") + (deal.state || "") +
            '</p>' +
          '</div>' +
          '<button class="crm-detail-close" onclick="closeDetailPanel()">' +
            '<i data-lucide="x"></i>' +
          '</button>' +
        '</div>' +
        renderAcqTimeline(deal) +
        renderDetailKpiStrip(deal) +
        tabsHtml +
        '<div class="crm-detail-content">' + contentHtml + '</div>';

      initLucide();
    }

    function switchDetailTab(tab) {
      crmState.activeTab = tab;
      var deal = dealsGetById(crmState.selectedDealId);
      if (deal) {
        renderDetailPanelContent(deal);
      }
    }

    /* ══════════════════════════════════════════════════════
       INIT
    ══════════════════════════════════════════════════════ */
    document.addEventListener("DOMContentLoaded", function() {
      // Restore theme
      try {
        var saved = localStorage.getItem("parcyl-theme");
        if (saved === "light" || saved === "dark") _currentMode = saved;
      } catch(e) {}

      // Apply theme
      applyTheme(getTheme());

      // Render nav with Deal Room active
      renderNav("crm", "New Deal", "renderAddDealModal()");

      // Init Lucide
      initLucide();

      // Init CRM (sidebar and board)
      initCRM();

      // Render pipeline table
      renderTable();
    });
  </script>
</body>
</html>
